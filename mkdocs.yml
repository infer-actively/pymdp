site_name: pymdp
site_description: JAX-first Active Inference in discrete state spaces
site_url: https://pymdp-rtd.readthedocs.io/en/latest/
repo_url: https://github.com/infer-actively/pymdp
repo_name: infer-actively/pymdp
docs_dir: docs-mkdocs
site_dir: !ENV [MKDOCS_SITE_DIR, site]
strict: true
validation:
  omitted_files: ignore
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
extra_css:
  - styles/crisp-api.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js
plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_signature_annotations: true
            show_root_heading: true
            docstring_style: numpy
            heading_level: 2
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart (JAX): getting-started/quickstart-jax.md
  - Guides:
      - Using rollout() for compiled active inference loops: guides/rollout-active-inference-loop.md
      - PymdpEnv and Custom Environments: guides/pymdp-env.md
      - Generative Model Structure: guides/generative-model-structure.md
  - Migration:
      - NumPy/legacy to JAX: migration/numpy-to-jax.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Notebook Gallery: tutorials/notebooks/index.md
  - API Reference:
      - Overview: api/index.md
      - Agent: api/agent.md
      - Inference: api/inference.md
      - Control: api/control.md
      - Learning: api/learning.md
      - Algorithms: api/algos.md
      - Utils: api/utils.md
      - Maths: api/maths.md
      - Environment: api/envs-env.md
      - Env Rollout: api/envs-rollout.md
      - Sophisticated Inference Planning: api/planning-si.md
      - MCTS Planning: api/planning-mcts.md
  - Legacy:
      - Legacy/NumPy Archive: legacy/index.md
  - Development:
      - Viewing Docs Locally: development/viewing-docs.md
      - Release Notes: development/release-notes.md
