name: Lint

on:
  pull_request:
    paths:
      - '**.py'
      - '.github/workflows/lint.yaml'
      - 'pyproject.toml'


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Analysing the code with ruff
      run: uvx ruff check
