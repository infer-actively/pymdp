repos:
  - repo: local
    hooks:
      - id: sanitize-notebooks
        name: sanitize notebooks by tier
        entry: uv run --group dev python scripts/notebook_precommit.py sanitize
        language: system
        files: ^examples/.*\.ipynb$
        pass_filenames: true
      - id: validate-ci-notebooks
        name: validate CI notebook execution counts
        entry: uv run --group dev python scripts/notebook_precommit.py validate-ci
        language: system
        files: ^examples/.*\.ipynb$
        pass_filenames: true
